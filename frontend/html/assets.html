<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets - FoxPro</title>
  <link rel="stylesheet" href="../css/assets.css">
</head>
<body>
  <!-- Top Header -->
  <header class="top-header">
    <div class="logo">FoxPro</div>
  </header>

  <!-- Banner -->
  <div class="banner">
    <img src="../images/assets-banner.jpg" alt="Assets Banner">
  </div>

  <!-- Asset Overview -->
  <div class="asset-overview">
    <h3>Total Assets</h3>
    <p>$100,000.00</p> <!-- Example, dynamic data will come here -->
  </div>

  <!-- Asset Tabs -->
  <div class="asset-tabs">
    <button class="tab-button active" id="platform-assets">Platform Assets</button>
    <button class="tab-button" id="investment-assets">Investment Assets</button>
    <button class="tab-button" id="contract-assets">Contract Assets</button>
  </div>

  <!-- Asset Details -->
  <div class="asset-details">
    <h3>Platform Assets</h3>
    <ul>
      <li>BTC: 2.5</li>
      <li>ETH: 10.0</li>
      <li>USDT: 50,000</li>
      <!-- More assets will be listed here -->
    </ul>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span>Home</span>
    </a>
    <a href="market.html" class="nav-item">
      <span>Market</span>
    </a>
    <a href="trade.html" class="nav-item">
      <span>Trade</span>
    </a>
    <a href="assets.html" class="nav-item active">
      <span>Assets</span>
    </a>
    <a href="account.html" class="nav-item">
      <span>Account</span>
    </a>
  </nav>

  <script src="../js/main.js"></script>
</body>
</html>
